name: Deploy Infra

on:
  push:
    branches: ['main']
    paths:
      - 'infra/**'
      - 'scripts/grant-runner-msi.sh'
      - 'package.json'
      - '.github/workflows/deploy-infra.yml'
  workflow_dispatch:
    inputs:
      deploy_aci:
        description: 'Deploy ACI (restarts container in prod)'
        type: boolean
        default: false
      deploy_logicapps:
        description: 'Deploy scheduler Logic App (+ grant MSI)'
        type: boolean
        default: true

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      RESOURCE_GROUP: f1-fantazy-bot
      DEPLOYMENT_SUFFIX: ${{ github.run_id }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: changes
        if: github.event_name == 'push'
        uses: dorny/paths-filter@v3
        with:
          filters: |
            aci:
              - 'infra/aci/**'
            logicapps:
              - 'infra/scheduler/**'
              - 'scripts/grant-runner-msi.sh'

      - name: Resolve deploy flags
        id: flags
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "aci=${{ inputs.deploy_aci }}" >> "$GITHUB_OUTPUT"
            echo "logicapps=${{ inputs.deploy_logicapps }}" >> "$GITHUB_OUTPUT"
          else
            echo "aci=${{ steps.changes.outputs.aci }}" >> "$GITHUB_OUTPUT"
            echo "logicapps=${{ steps.changes.outputs.logicapps }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Azure login
        if: steps.flags.outputs.aci == 'true' || steps.flags.outputs.logicapps == 'true'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy ACI
        if: steps.flags.outputs.aci == 'true'
        run: npm run deploy:aci

      - name: Deploy scheduler Logic App (+ grant MSI)
        if: steps.flags.outputs.logicapps == 'true'
        run: npm run deploy:logicapps
